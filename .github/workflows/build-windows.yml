# .github/workflows/build-windows.yml
name: Build Windows EXE

# トリガー：mainブランチにPushされたら自動で動き出す
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # ここが魔法の鍵！GitHubが用意する「最新のWindows仮想マシン」を指定
    runs-on: windows-latest

    steps:
    - name: コードの取得（Checkout）
      uses: actions/checkout@v4

    - name: Python環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 安定版のPythonを指定

    - name: 必要なライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 【修正】Windows環境でも確実に動くように python -m を付与
        python -m playwright install chromium

    - name: PyInstallerでWindows用実行ファイル（.exe）をビルド
      run: |
        pyinstaller --noconsole --onefile ui/app.py

    - name: 完成した.exeファイルをダウンロード可能にする（Artifact化）
      uses: actions/upload-artifact@v4
      with:
        name: CyberDetective-Windows-App
        path: dist/app.exe